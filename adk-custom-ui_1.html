<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ADK Agent Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.07);
    --border-active: rgba(99,179,237,0.4);
    --text: #e8ecf4;
    --text-muted: #6b7692;
    --text-dim: #3d4460;
    --accent: #63b3ed;
    --accent-glow: rgba(99,179,237,0.15);
    --accent-dim: rgba(99,179,237,0.08);
    --agent-bubble: #1a2035;
    --user-bubble: #0e2a45;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

  /* Layout */
  .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .brand-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent-dim);
    border: 1px solid var(--border-active);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .brand-name {
    font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
    color: var(--text);
  }
  .brand-sub {
    font-size: 11px; color: var(--text-muted); font-family: var(--mono);
    margin-top: 1px;
  }
  .new-chat-btn {
    width: 100%; padding: 9px 14px;
    background: var(--accent-dim);
    border: 1px solid var(--border-active);
    border-radius: var(--radius-sm);
    color: var(--accent);
    font-size: 13px; font-family: var(--sans); font-weight: 500;
    cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s, border-color 0.15s;
  }
  .new-chat-btn:hover { background: rgba(99,179,237,0.15); }
  .new-chat-btn::before { content: '+'; font-size: 18px; line-height: 1; }

  /* Config section */
  .config-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .config-label {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .config-input {
    width: 100%; padding: 7px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 12px; font-family: var(--mono);
    outline: none; transition: border-color 0.15s;
    margin-bottom: 6px;
  }
  .config-input:focus { border-color: var(--border-active); }
  .config-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .config-row .config-input { margin-bottom: 0; flex: 1; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0;
    align-self: center; transition: background 0.3s;
    box-shadow: 0 0 0 0 transparent; transition: all 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.5); }
  .status-dot.error { background: var(--red); }

  /* Sessions list */
  .sessions-area {
    flex: 1; overflow-y: auto; padding: 12px 12px;
  }
  .sessions-area::-webkit-scrollbar { width: 4px; }
  .sessions-area::-webkit-scrollbar-track { background: transparent; }
  .sessions-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .session-item {
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.12s;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item.active { background: var(--accent-dim); border-color: var(--border-active); }
  .session-title {
    font-size: 12px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .session-id {
    font-size: 10px; color: var(--text-muted); font-family: var(--mono);
    margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Main chat area */
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .chat-header-info { flex: 1; }
  .chat-app-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .chat-session-id {
    font-size: 11px; color: var(--text-muted); font-family: var(--mono);
    margin-top: 2px;
  }
  .mode-badge {
    font-size: 10px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 4px;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid var(--border-active); letter-spacing: 0.05em;
  }

  /* Messages */
  .messages-area {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message { display: flex; gap: 12px; animation: fadeIn 0.2s ease; max-width: 100%; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    font-family: var(--mono); font-weight: 500;
  }
  .avatar.agent {
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid var(--border-active);
  }
  .avatar.user {
    background: rgba(251,191,36,0.1); color: var(--yellow);
    border: 1px solid rgba(251,191,36,0.3);
  }
  .bubble {
    max-width: 75%; padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px; line-height: 1.65; word-break: break-word;
  }
  .message.agent .bubble {
    background: var(--agent-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(99,179,237,0.2);
    border-top-right-radius: 4px;
    color: var(--text);
  }
  .bubble code {
    font-family: var(--mono); font-size: 12px;
    background: rgba(255,255,255,0.05); padding: 1px 5px;
    border-radius: 4px; color: var(--accent);
  }
  .bubble pre {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px;
    overflow-x: auto; font-family: var(--mono); font-size: 12px;
    margin-top: 8px; white-space: pre-wrap;
  }
  .bubble pre code { background: none; padding: 0; color: var(--text-muted); }
  .msg-meta {
    font-size: 10px; color: var(--text-muted); font-family: var(--mono);
    margin-top: 5px;
  }
  .message.user .msg-meta { text-align: right; }

  /* Tool call block */
  .tool-call {
    background: var(--surface2); border: 1px solid var(--border);
    border-left: 3px solid var(--yellow);
    border-radius: var(--radius-sm); padding: 10px 12px;
    font-family: var(--mono); font-size: 11px;
    margin-top: 8px; color: var(--text-muted);
  }
  .tool-call-name { color: var(--yellow); font-weight: 500; margin-bottom: 4px; font-size: 12px; }

  /* Thinking indicator */
  .thinking { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; }
  .dots span {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-dim); animation: pulse 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  /* Empty state */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); text-align: center; gap: 12px;
  }
  .empty-icon { font-size: 40px; opacity: 0.3; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text-dim); }
  .empty-sub { font-size: 12px; font-family: var(--mono); max-width: 300px; line-height: 1.6; }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-box {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.15s;
  }
  .input-box:focus-within { border-color: var(--border-active); }
  textarea#msgInput {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--sans); font-size: 14px;
    resize: none; max-height: 160px; line-height: 1.6;
    min-height: 22px;
  }
  textarea#msgInput::placeholder { color: var(--text-dim); }
  .send-btn {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: var(--accent); border: none;
    color: #0d0f14; font-size: 16px;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    align-self: flex-end;
  }
  .send-btn:hover:not(:disabled) { background: #90cdf4; }
  .send-btn:active:not(:disabled) { transform: scale(0.95); }
  .send-btn:disabled { background: var(--text-dim); cursor: not-allowed; }
  .input-hint {
    font-size: 11px; color: var(--text-dim); margin-top: 8px;
    font-family: var(--mono); text-align: center;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 16px;
    font-size: 13px; color: var(--text);
    animation: slideIn 0.2s ease; max-width: 320px;
  }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.success { border-left: 3px solid var(--green); }
  @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">⬡</div>
        <div>
          <div class="brand-name">ADK Agent</div>
          <div class="brand-sub">Custom UI</div>
        </div>
      </div>
      <button class="new-chat-btn" onclick="newSession()">New conversation</button>
    </div>

    <div class="config-section">
      <div class="config-label">Connection</div>
      <input class="config-input" id="hostInput" placeholder="http://localhost:8000" value="http://localhost:8000"/>
      <input class="config-input" id="appInput" placeholder="app name (folder name)" value="my_agent"/>
      <div class="config-row">
        <input class="config-input" id="userInput" placeholder="user_id" value="user_001"/>
        <div class="status-dot" id="statusDot" title="Connection status"></div>
      </div>
      <button class="new-chat-btn" onclick="connectAndInit()" style="margin-top:4px">Connect</button>
    </div>

    <div class="sessions-area" id="sessionsList">
      <div style="font-size:11px;color:var(--text-dim);text-align:center;padding:20px;font-family:var(--mono)">
        Connect to load sessions
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-app-name" id="headerApp">
          Connect your agent
          <span class="mode-badge">SSE streaming</span>
        </div>
        <div class="chat-session-id" id="headerSession">No active session</div>
      </div>
    </div>

    <div class="messages-area" id="messagesArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">No active conversation</div>
        <div class="empty-sub">Connect to your ADK agent and start a new conversation, or select an existing session from the sidebar.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="msgInput" placeholder="Send a message to your agent…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled title="Send (Enter)">
          ↑
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for newline</div>
    </div>
  </main>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  host: 'http://localhost:8000',
  appName: 'my_agent',
  userId: 'user_001',
  sessionId: null,
  sessions: [],
  connected: false,
  streaming: false
};

// ─── Init ─────────────────────────────────────────────────────────────────────
async function connectAndInit() {
  state.host    = document.getElementById('hostInput').value.replace(/\/$/, '');
  state.appName = document.getElementById('appInput').value.trim();
  state.userId  = document.getElementById('userInput').value.trim();

  setStatus('checking');
  try {
    // Verify server is alive
    const resp = await fetch(`${state.host}/list_apps`, { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
    const apps = await resp.json();
    state.connected = true;
    setStatus('connected');
    showToast(`Connected · apps: ${apps.join(', ')}`, 'success');
    await loadSessions();
  } catch (e) {
    setStatus('error');
    showToast(`Cannot reach ${state.host}: ${e.message}`, 'error');
  }
}

async function loadSessions() {
  try {
    const resp = await fetch(
      `${state.host}/apps/${state.appName}/users/${state.userId}/sessions`
    );
    if (!resp.ok) return;
    const data = await resp.json();
    state.sessions = data.sessions || data || [];
    renderSessionsList();
  } catch(e) { /* sessions not critical */ }
}

function renderSessionsList() {
  const el = document.getElementById('sessionsList');
  if (!state.sessions.length) {
    el.innerHTML = `<div style="font-size:11px;color:var(--text-dim);text-align:center;padding:20px;font-family:var(--mono)">No sessions yet</div>`;
    return;
  }
  el.innerHTML = state.sessions.map((s, i) => {
    const sid = typeof s === 'string' ? s : s.id || s.session_id || JSON.stringify(s);
    const active = sid === state.sessionId ? 'active' : '';
    return `<div class="session-item ${active}" onclick="selectSession('${sid}')">
      <div class="session-title">Conversation ${i+1}</div>
      <div class="session-id">${sid.substring(0,28)}…</div>
    </div>`;
  }).join('');
}

async function newSession() {
  if (!state.connected) { showToast('Connect first', 'error'); return; }
  try {
    const resp = await fetch(
      `${state.host}/apps/${state.appName}/users/${state.userId}/sessions`,
      { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' }
    );
    const data = await resp.json();
    const sid = data.id || data.session_id || data.sessionId;
    if (!sid) throw new Error('No session ID in response');
    state.sessionId = sid;
    await loadSessions();
    clearMessages();
    updateHeader();
    enableInput();
    showToast('New session created', 'success');
  } catch(e) {
    showToast(`Failed to create session: ${e.message}`, 'error');
  }
}

async function selectSession(sid) {
  state.sessionId = sid;
  renderSessionsList();
  clearMessages();
  updateHeader();
  enableInput();
  // Optionally load history here
}

// ─── Messaging ────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || state.streaming) return;
  if (!state.sessionId) { showToast('Create or select a session first', 'error'); return; }

  input.value = '';
  autoResize(input);
  appendMessage('user', text);

  const thinkId = appendThinking();
  disableInput();
  state.streaming = true;

  try {
    await streamSSE(text, thinkId);
  } catch(e) {
    removeThinking(thinkId);
    appendMessage('agent', `Error: ${e.message}`);
  } finally {
    state.streaming = false;
    enableInput();
  }
}

async function streamSSE(userText, thinkId) {
  const url = `${state.host}/apps/${state.appName}/users/${state.userId}/sessions/${state.sessionId}/run_sse`;
  const body = JSON.stringify({
    message: { role: 'user', parts: [{ text: userText }] },
    streaming: true
  });

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`${resp.status}: ${errText}`);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  let agentMsgId = null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (!raw || raw === '[DONE]') continue;

      try {
        const evt = JSON.parse(raw);
        // Remove thinking indicator on first real event
        if (thinkId) { removeThinking(thinkId); thinkId = null; }
        agentMsgId = handleSSEEvent(evt, agentMsgId);
      } catch(_) { /* malformed chunk */ }
    }
  }

  if (thinkId) removeThinking(thinkId);
}

function handleSSEEvent(evt, agentMsgId) {
  // ADK SSE event structure:
  // { content: { parts: [{text: "..."}], role: "model" }, ... }
  // or { tool_code: {...} } for tool calls

  if (evt.content) {
    const parts = evt.content.parts || [];
    let textOut = '';
    let toolCalls = [];

    parts.forEach(p => {
      if (p.text) textOut += p.text;
      if (p.functionCall) toolCalls.push(p.functionCall);
    });

    // Tool calls
    toolCalls.forEach(tc => {
      appendToolCall(tc.name, tc.args);
    });

    // Text content — stream into existing bubble or create new
    if (textOut) {
      if (agentMsgId) {
        appendToMessage(agentMsgId, textOut);
      } else {
        agentMsgId = appendMessage('agent', textOut);
      }
    }
  }

  // final event
  if (evt.turn_complete || evt.done) {
    agentMsgId = null;
  }

  return agentMsgId;
}

// ─── DOM Helpers ──────────────────────────────────────────────────────────────
function appendMessage(role, text) {
  const area = document.getElementById('messagesArea');
  document.getElementById('emptyState')?.remove();

  const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const avatarLabel = role === 'agent' ? '⬡' : 'U';
  const avatarClass = role === 'agent' ? 'agent' : 'user';

  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.id = id;
  div.innerHTML = `
    <div class="avatar ${avatarClass}">${avatarLabel}</div>
    <div>
      <div class="bubble" id="bubble-${id}">${formatText(text)}</div>
      <div class="msg-meta">${time}</div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

function appendToMessage(msgId, text) {
  const bubble = document.getElementById(`bubble-${msgId}`);
  if (!bubble) return;
  bubble.innerHTML = formatText(bubble.dataset.raw ? bubble.dataset.raw + text : bubble.innerHTML + text);
  if (!bubble.dataset.raw) bubble.dataset.raw = '';
  bubble.dataset.raw += text;
  document.getElementById('messagesArea').scrollTop = 99999;
}

function appendThinking() {
  const area = document.getElementById('messagesArea');
  const id = 'think-' + Date.now();
  const div = document.createElement('div');
  div.className = 'message agent';
  div.id = id;
  div.innerHTML = `
    <div class="avatar agent">⬡</div>
    <div>
      <div class="bubble">
        <div class="thinking">
          <div class="dots"><span></span><span></span><span></span></div>
          Thinking…
        </div>
      </div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeThinking(id) {
  document.getElementById(id)?.remove();
}

function appendToolCall(name, args) {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'message agent';
  div.innerHTML = `
    <div class="avatar agent">⬡</div>
    <div>
      <div class="bubble">
        <div class="tool-call">
          <div class="tool-call-name">⚙ ${name}</div>
          <pre><code>${JSON.stringify(args, null, 2)}</code></pre>
        </div>
      </div>
    </div>`;
  area.appendChild(div);
}

function formatText(text) {
  // Basic markdown-ish formatting
  return text
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function clearMessages() {
  const area = document.getElementById('messagesArea');
  area.innerHTML = `<div class="empty-state" id="emptyState">
    <div class="empty-icon">⬡</div>
    <div class="empty-title">Session ready</div>
    <div class="empty-sub">Send a message to start.</div>
  </div>`;
}

function updateHeader() {
  document.getElementById('headerApp').innerHTML =
    `${state.appName} <span class="mode-badge">SSE streaming</span>`;
  document.getElementById('headerSession').textContent =
    state.sessionId ? `Session: ${state.sessionId}` : 'No session';
}

function enableInput() {
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').disabled = false;
  document.getElementById('msgInput').focus();
}
function disableInput() {
  document.getElementById('sendBtn').disabled = true;
}

function setStatus(s) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (s === 'connected' ? 'connected' : s === 'error' ? 'error' : '');
}

function showToast(msg, type='') {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ─── Input UX ─────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ─── Auto-connect on load if defaults are sensible ─────────────────────────────
// connectAndInit(); // Uncomment to auto-connect on page load
</script>
</body>
</html>
